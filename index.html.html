<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Operacional de Faturamento | Blip</title>
  
  <!-- Fontes Oficiais Blip Style (Inter + JetBrains Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       BLIP DESIGN SYSTEM - MODERN TOPBAR LAYOUT
       ========================================================================== */
    :root {
      --blip-night: #071F73;
      --blip-dark: #0E45B2;
      --blip-action: #1878F0;
      --blip-blue: #1C91E8;
      --blip-light: #EBF3FE;
      
      --bg-primary: #F4F6FA;
      --bg-surface: #FFFFFF;
      --border-color: #E2E8F0;
      --text-primary: #0B1A42;
      --text-secondary: #475569;
      --text-muted: #94A3B8;

      --shadow-sm: 0 2px 4px rgba(7, 31, 115, 0.04);
      --shadow-md: 0 8px 24px rgba(7, 31, 115, 0.08);
      --shadow-lg: 0 16px 32px rgba(7, 31, 115, 0.12);

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 24px;
      --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg-primary: #050A1A;
      --bg-surface: #0E1631;
      --border-color: #1E293B;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --blip-light: #15224F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.5; -webkit-font-smoothing: antialiased; }
    
    .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header & Navbar Superior Estilo Blip.ai */
    .header-nav {
      position: sticky; top: 0; z-index: 1000;
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
    }

    .header-container {
      max-width: 1280px; margin: 0 auto;
      height: 72px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .brand-logo-badge { background: var(--blip-action); color: #FFF; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 12px rgba(24, 120, 240, 0.3); }
    .brand-title { font-weight: 800; font-size: 1.15rem; color: var(--blip-night); [data-theme="dark"] & { color: #FFF; } letter-spacing: -0.02em; }

    /* Menu de Navegação Horizontal */
    .nav-tabs { display: flex; align-items: center; gap: 8px; }
    .nav-tab-item {
      padding: 10px 18px; border-radius: var(--radius-sm);
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: var(--transition);
    }
    .nav-tab-item:hover { background-color: var(--blip-light); color: var(--blip-action); }
    .nav-tab-item.active { background-color: var(--blip-action); color: #FFFFFF; box-shadow: 0 4px 12px rgba(24, 120, 240, 0.25); }

    /* Ações na Direita */
    .header-actions { display: flex; align-items: center; gap: 14px; }
    .search-trigger {
      display: flex; align-items: center; gap: 10px;
      background-color: var(--bg-primary); border: 1px solid var(--border-color);
      padding: 8px 16px; border-radius: var(--radius-md);
      color: var(--text-muted); font-size: 0.85rem; cursor: pointer; transition: var(--transition);
    }
    .search-trigger:hover { border-color: var(--blip-action); background-color: var(--bg-surface); }
    .btn-icon { background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-secondary); cursor: pointer; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 1rem; transition: var(--transition); }
    .btn-icon:hover { background-color: var(--blip-light); color: var(--blip-action); }

    /* Conteúdo Principal Estilo Hero Landing Page */
    .main-container { max-width: 1280px; margin: 0 auto; width: 100%; padding: 40px 24px; flex: 1; }
    
    .hero-banner {
      background: linear-gradient(135deg, var(--blip-night) 0%, var(--blip-dark) 100%);
      color: #FFFFFF; border-radius: var(--radius-lg); padding: 40px; margin-bottom: 36px;
      box-shadow: var(--shadow-md); position: relative; overflow: hidden;
    }
    .hero-banner h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .hero-banner p { font-size: 1rem; opacity: 0.85; max-width: 600px; }

    /* Grid de Cards Blip Modernos */
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
    .card {
      background-color: var(--bg-surface); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); padding: 28px; box-shadow: var(--shadow-sm);
      transition: var(--transition); display: flex; flex-direction: column; justify-content: space-between;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--blip-action); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
    .card-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); line-height: 1.3; }

    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
    .badge-blip { background-color: var(--blip-light); color: var(--blip-action); }

    .btn-action {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--blip-action); color: #FFFFFF; padding: 12px 20px;
      border-radius: var(--radius-sm); font-size: 0.88rem; font-weight: 700;
      text-decoration: none; transition: var(--transition); margin-top: 18px; border: none; cursor: pointer;
    }
    .btn-action:hover { background-color: var(--blip-dark); box-shadow: 0 4px 14px rgba(24, 120, 240, 0.35); }

    /* Modal de Busca Flutuante */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(7, 31, 115, 0.4); backdrop-filter: blur(8px); display: flex; align-items: flex-start; justify-content: center; padding-top: 100px; z-index: 2000; opacity: 0; pointer-events: none; transition: var(--transition); }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-search-container { background-color: var(--bg-surface); width: 100%; max-width: 640px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); overflow: hidden; }
    .modal-search-header { display: flex; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border-color); }
    .modal-search-header input { flex: 1; border: none; background: none; font-size: 1.1rem; font-weight: 600; margin-left: 12px; outline: none; color: var(--text-primary); }
    .search-results-list { max-height: 380px; overflow-y: auto; padding: 12px; }
    .search-item { padding: 14px 18px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: var(--transition); }
    .search-item:hover { background-color: var(--blip-light); }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <!-- Header Superior Limpo estilo Blip.ai -->
    <header class="header-nav">
      <div class="header-container">
        <a href="#" class="brand">
          <div class="brand-logo-badge">b</div>
          <span class="brand-title">Faturamento Hub</span>
        </a>

        <!-- Menu Superior por Abas -->
        <nav class="nav-tabs">
          <a class="nav-tab-item active" data-module="dashboard">📊 Visão Geral</a>
          <a class="nav-tab-item" data-module="processos">📚 Processos & Reuniões</a>
          <a class="nav-tab-item" data-module="sap-apps">💻 Transações SAP</a>
        </nav>

        <div class="header-actions">
          <div class="search-trigger" id="btn-trigger-search">
            <span>🔍 Buscar...</span>
          </div>
          <button class="btn-icon" id="btn-theme-toggle" title="Alternar Tema">🌓</button>
        </div>
      </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main-container" id="content-viewport"></main>
  </div>

  <!-- Modal de Busca -->
  <div class="modal-overlay" id="search-modal">
    <div class="modal-search-container">
      <div class="modal-search-header">
        <span>🔍</span>
        <input type="text" id="global-search-input" placeholder="Pesquisar gravações, processos ou SAP..." autocomplete="off">
        <button class="btn-icon" id="btn-close-search">✕</button>
      </div>
      <div class="search-results-list" id="search-results"></div>
    </div>
  </div>

  <script>
    let DB = { processos: [], sapApps: [] };
    const state = { currentModule: 'dashboard', theme: 'light' };

    document.addEventListener('DOMContentLoaded', () => {
      fetch('dados.json')
        .then(res => res.json())
        .then(data => { DB = data; initApp(); })
        .catch(err => { console.error('Erro ao carregar dados.json', err); initApp(); });
    });

    function initApp() {
      setupEventListeners();
      renderModule('dashboard');
    }

    function setupEventListeners() {
      document.querySelectorAll('.nav-tab-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          const module = item.getAttribute('data-module');
          document.querySelectorAll('.nav-tab-item').forEach(n => n.classList.remove('active'));
          item.classList.add('active');
          renderModule(module);
        });
      });

      const searchModal = document.getElementById('search-modal');
      document.getElementById('btn-trigger-search').addEventListener('click', () => searchModal.classList.add('active'));
      document.getElementById('btn-close-search').addEventListener('click', () => searchModal.classList.remove('active'));

      window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchModal.classList.add('active'); document.getElementById('global-search-input').focus(); }
        if (e.key === 'Escape') searchModal.classList.remove('active');
      });

      document.getElementById('btn-theme-toggle').addEventListener('click', () => {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', state.theme);
      });

      document.getElementById('global-search-input').addEventListener('input', (e) => handleGlobalSearch(e.target.value.toLowerCase()));
    }

    function renderModule(moduleId) {
      state.currentModule = moduleId;
      const viewport = document.getElementById('content-viewport');

      switch(moduleId) {
        case 'dashboard': viewport.innerHTML = renderDashboardView(); break;
        case 'processos': viewport.innerHTML = renderProcessosView(); break;
        case 'sap-apps': viewport.innerHTML = renderSAPAppsView(); break;
        default: viewport.innerHTML = renderDashboardView();
      }
    }

    function renderDashboardView() {
      return `
        <div class="hero-banner">
          <h1>Central Operacional de Faturamento</h1>
          <p>Sua base unificada de procedimentos, capacitações gravadas no Google Meet e documentações SAP BRIM.</p>
        </div>

        <h2 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; color: var(--text-primary);">🚀 Processos & Capacitações Recentes</h2>
        <div class="grid-cards">
          ${DB.processos.map(proc => `
            <div class="card">
              <div>
                <div class="card-header">
                  <span class="card-title">${proc.title}</span>
                  <span class="badge badge-blip">${proc.sapApp}</span>
                </div>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px;">${proc.description}</p>
              </div>
              ${proc.videoUrl ? `
                <a href="${proc.videoUrl}" target="_blank" class="btn-action">
                  ▶ Assistir Capacitação (Google Meet)
                </a>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderProcessosView() {
      return `
        <div style="margin-bottom: 28px;">
          <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 6px;">Documentação de Processos</h1>
          <p style="color: var(--text-secondary);">Guia completo de execução com gravações e checklists do operador.</p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 24px;">
          ${DB.processos.map(proc => `
            <div class="card">
              <div class="card-header">
                <span class="card-title">📚 ${proc.title}</span>
                <span class="badge badge-blip">SLA: ${proc.sla}</span>
              </div>
              <p style="margin-bottom: 16px; color: var(--text-secondary); font-size:0.95rem;">${proc.description}</p>
              
              ${proc.videoUrl ? `
                <div style="margin-bottom: 20px; background-color: var(--blip-light); padding: 18px; border-radius: var(--radius-sm); border-left: 4px solid var(--blip-action);">
                  <strong style="font-size: 0.9rem; color: var(--blip-night); display: block; margin-bottom: 8px;">🎥 Gravação Oficial (Google Meet):</strong>
                  <a href="${proc.videoUrl}" target="_blank" class="btn-action" style="margin-top:0; display:inline-flex;">
                    ▶ Abrir Vídeo da Reunião
                  </a>
                </div>
              ` : ''}

              <h4 style="font-size:0.9rem; font-weight:700; margin-bottom: 10px;">Checklist de Execução:</h4>
              <ul style="padding-left: 20px; font-size: 0.9rem; color: var(--text-secondary);">
                ${proc.steps.map(step => `<li style="margin-bottom: 6px;">${step}</li>`).join('')}
              </ul>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderSAPAppsView() {
      return `
        <div style="margin-bottom: 28px;">
          <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 6px;">Transações SAP BRIM</h1>
          <p style="color: var(--text-secondary);">Guia prático para execução de rotinas no FI-CA.</p>
        </div>
        <div class="grid-cards">
          ${DB.sapApps.map(app => `
            <div class="card">
              <div>
                <div style="font-family:'JetBrains Mono'; color:var(--blip-action); font-weight:700; font-size:1.25rem; margin-bottom:6px;">${app.code}</div>
                <h3 style="font-size: 1.05rem; font-weight: 700; margin-bottom: 10px;">${app.name}</h3>
                <p style="font-size:0.9rem; color:var(--text-secondary);">${app.objective}</p>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function handleGlobalSearch(query) {
      const container = document.getElementById('search-results');
      if (!query) { container.innerHTML = '<div style="padding:16px; text-align:center; color: var(--text-muted);">Digite para buscar...</div>'; return; }
      let matches = [];
      DB.processos.forEach(p => { if (p.title.toLowerCase().includes(query)) matches.push({ title: p.title }); });
      container.innerHTML = matches.map(m => `<div class="search-item"><strong>${m.title}</strong><span style="font-size:0.8rem; color:var(--blip-action);">Abrir →</span></div>`).join('');
    }
  </script>
</body>
</html>
